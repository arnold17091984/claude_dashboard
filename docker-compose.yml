services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-dashboard:latest
    container_name: claude-dashboard
    restart: unless-stopped

    ports:
      - "3000:3000"

    # Load environment variables from a .env file in the project root.
    # Copy .env.example to .env and fill in real values before running.
    env_file:
      - .env

    # Explicit environment variable declarations provide defaults and make
    # required variables visible without inspecting the .env file.
    environment:
      NODE_ENV: production
      # DATABASE_URL must point to a path inside /app/data so the SQLite file
      # is persisted via the bind-mount volume defined below.
      DATABASE_URL: ${DATABASE_URL:-/app/data/dashboard.db}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      # ANTHROPIC_API_KEY is optional; omit or leave blank if not using AI features.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

    volumes:
      # Bind-mount keeps the SQLite database on the host so it survives container
      # rebuilds and restarts and can be inspected or backed up directly.
      # The ./data directory is created automatically by Docker Compose if absent.
      - ./data:/app/data

    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          node -e "require('http').get('http://localhost:3000/api/v1/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
