services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-dashboard:latest
    container_name: claude-dashboard
    restart: unless-stopped

    ports:
      - "3000:3000"

    # Load environment variables from a .env file in the project root.
    # Copy .env.example to .env and fill in real values before running.
    env_file:
      - .env

    # Explicit environment variable declarations provide defaults and make
    # required variables visible without inspecting the .env file.
    environment:
      NODE_ENV: production
      # DATABASE_URL should point to a path inside the /app/data volume so the
      # SQLite file is persisted across container restarts.
      DATABASE_URL: ${DATABASE_URL:-/app/data/dashboard.db}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      # ANTHROPIC_API_KEY is optional; omit or leave blank if not using AI features.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

    volumes:
      # Named volume keeps the SQLite database across container rebuilds and
      # restarts. Using a named volume (rather than a bind-mount) avoids
      # permission issues on Linux where the host uid/gid may differ from the
      # container's nextjs user (uid 1001).
      # For development or when direct file access is needed, replace with:
      #   - ./data:/app/data
      - dashboard_data:/app/data

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dashboard_data:
    driver: local
